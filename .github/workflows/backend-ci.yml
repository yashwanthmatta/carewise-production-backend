name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CAREWISE_ENV: test
      CAREWISE_DATABASE_URL: sqlite:///:memory:
      CAREWISE_REDIS_URL: ""
      CAREWISE_JWT_SECRET: ci-test-secret-change-before-production
      CAREWISE_FIELD_ENCRYPTION_KEY: nSXvMikGU90uvDvpcZOKNBT9VvPHzeR9nMbCssnLydY=
      CAREWISE_ALLOWED_ORIGINS: http://localhost:4173,http://localhost:3000
      CAREWISE_OTEL_EXPORTER_OTLP_ENDPOINT: ""
      CAREWISE_STORAGE_BACKEND: local
      CAREWISE_LOCAL_STORAGE_DIR: storage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Static readiness
        run: python tests/static_readiness_check.py

      - name: Compile deploy smoke test
        run: python -m py_compile scripts/smoke_test_deploy.py

      - name: Pytest
        run: python -m pytest
