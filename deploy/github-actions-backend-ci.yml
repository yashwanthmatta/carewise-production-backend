name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CAREWISE_ENV: test
      CAREWISE_DATABASE_URL: sqlite:///:memory:
      CAREWISE_JWT_SECRET: test-secret-that-is-long-enough
      CAREWISE_FIELD_ENCRYPTION_KEY: test-fernet-key-for-carewise-tests
      CAREWISE_ALLOWED_ORIGINS: http://localhost:4173
      CAREWISE_LOCAL_STORAGE_DIR: /tmp/carewise-test-storage
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest
      - run: python tests/static_readiness_check.py
