services:
  - type: web
    name: carewise-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CAREWISE_ENV
        value: production
      - key: CAREWISE_DATABASE_URL
        fromDatabase:
          name: carewise-postgres
          property: connectionString
      - key: CAREWISE_JWT_SECRET
        sync: false
      - key: CAREWISE_FIELD_ENCRYPTION_KEY
        sync: false
      - key: CAREWISE_ACCESS_TOKEN_MINUTES
        value: "30"
      - key: CAREWISE_REFRESH_TOKEN_DAYS
        value: "30"
      - key: CAREWISE_ALLOWED_ORIGINS
        sync: false
      - key: CAREWISE_OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""
      - key: CAREWISE_LOCAL_STORAGE_DIR
        value: /tmp/carewise-storage
      - key: CAREWISE_STORAGE_BACKEND
        value: local
      - key: CAREWISE_S3_BUCKET
        sync: false
      - key: CAREWISE_S3_REGION
        value: us-east-1
      - key: CAREWISE_S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: CAREWISE_MAX_REPORT_FILE_BYTES
        value: "10485760"
      - key: CAREWISE_STRIPE_SECRET_KEY
        sync: false
      - key: CAREWISE_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CAREWISE_STRIPE_SUCCESS_URL
        value: https://carewise-frontend.onrender.com/?checkout=success
      - key: CAREWISE_STRIPE_CANCEL_URL
        value: https://carewise-frontend.onrender.com/?checkout=cancelled
      - key: CAREWISE_PASSWORD_RESET_TOKEN_MINUTES
        value: "30"
      - key: CAREWISE_EMAIL_VERIFICATION_TOKEN_MINUTES
        value: "1440"
      - key: CAREWISE_FRONTEND_URL
        value: https://carewise-frontend.onrender.com
      - key: CAREWISE_SMTP_HOST
        sync: false
      - key: CAREWISE_SMTP_PORT
        value: "587"
      - key: CAREWISE_SMTP_USERNAME
        sync: false
      - key: CAREWISE_SMTP_PASSWORD
        sync: false
      - key: CAREWISE_SMTP_FROM_EMAIL
        sync: false
      - key: CAREWISE_SMTP_USE_TLS
        value: "true"
      - key: CAREWISE_AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "900"
      - key: CAREWISE_AUTH_RATE_LIMIT_MAX_ATTEMPTS
        value: "8"

databases:
  - name: carewise-postgres
    plan: free
