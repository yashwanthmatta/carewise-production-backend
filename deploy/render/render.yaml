services:
  - type: web
    name: carewise-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CAREWISE_ENV
        value: production
      - key: CAREWISE_DATABASE_URL
        fromDatabase:
          name: carewise-postgres
          property: connectionString
      - key: CAREWISE_JWT_SECRET
        sync: false
      - key: CAREWISE_FIELD_ENCRYPTION_KEY
        sync: false
      - key: CAREWISE_ALLOWED_ORIGINS
        sync: false
      - key: CAREWISE_OTEL_EXPORTER_OTLP_ENDPOINT
        value: ""

databases:
  - name: carewise-postgres
    plan: free
