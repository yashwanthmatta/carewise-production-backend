services:
  api:
    build: .
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    env_file: .env.example
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: carewise
      POSTGRES_PASSWORD: carewise
      POSTGRES_DB: carewise
    ports:
      - "5432:5432"
    volumes:
      - carewise-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  carewise-postgres:
